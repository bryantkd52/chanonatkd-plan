<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>ChanonaTKD • Plan</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="appShell">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="logoImg" id="logoImg" alt="ChanonaTKD Logo" />
        <div class="brandText">
          <h1>ChanonaTKD • Plan</h1>
          <div class="brandRow">
            <p id="brandSub">Cargando alumno…</p>
            <div class="brandMeta" id="brandMeta"></div>
          </div>
        </div>
      </div>

      <div class="menu" id="menu">
        <button class="btn active" data-tab="resumen"><span class="dot"></span> Resumen</button>
        <button class="btn" data-tab="chanonaflex"><span class="dot"></span> ChanonaFlex</button>
        <button class="btn" data-tab="isometrico"><span class="dot"></span> Isométrico Activo</button>
        <button class="btn" data-tab="pateo"><span class="dot"></span> Trabajo Técnico Pateo</button>
        <button class="btn" data-tab="poomsae"><span class="dot"></span> Trabajo Técnico Poomsae</button>

               

        <button class="btn" data-tab="notas"><span class="dot"></span> Notas Finales</button>
      </div>

      <div class="mini">
        Tip: toca un ejercicio y usa <b>“Reproducir”</b>. Se abrirá en Drive en otra pestaña.
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div class="titleBlock">
          <h2 id="planTitle">Plan • Cargando…</h2>
          <div class="sub" id="planSub">Cargando ciclo y alumno…</div>
        </div>

        <div class="chipRow">
          <div class="chip red" id="chipFocus">🎯 Enfoque: —</div>
          <div class="chip">🔥 ChanonaTKD</div>
          <div class="chip" id="chipUpdated">🕒 —</div>
        </div>
      </div>

      <div class="content" id="content">
        <div class="loaderCard">
          <div class="loaderTitle">Cargando tu plan…</div>
          <div class="loaderSub">Si no carga, revisa el link del alumno.</div>
        </div>
      </div>
    </main>
  </div>

  <script src="./app.js?v=team-poomsae-20260615-2"></script>
</body>
</html>
